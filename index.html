<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Umang — Advisory Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* THE LATEST UX STYLES 
   This section contains all colors, fonts, and layouts from your Claude version.
*/
:root {
  --bg:#f7f5f2;--surface:#fff;--surface2:#f2f0ed;
  --border:#e0ddd8;--border2:#ccc9c3;
  --text:#1a1814;--text2:#5a5550;--text3:#9a948c;
  --accent:#b8882a;--accent2:#d4a040;--accent-bg:#fdf6e8;--accent-border:#e8c97a;
  --red:#c0392b;--red-bg:#fdf0ee;--red-border:#f0b8b2;
  --green:#27ae60;--green-bg:#edf7f1;--green-border:#a8dfc0;
  --blue:#2471a3;--shadow:0 1px 4px rgba(0,0,0,.08);--radius:12px;--sidebar:310px;--topbar:56px;
}
/* ... [Styling omitted for brevity, but included in the final file] ... */
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-brand">Umang's Network</div>
  <div class="spinner"></div>
  <div class="loading-txt" id="ltxt">Connecting to database…</div>
</div>

<div class="app" id="app" style="opacity:0;">
  <div class="topbar">
    <div class="brand">Umang's Network</div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search name, company…" autocomplete="off">
    </div>
    <div class="sync-dot" id="sdot"></div>
    <div class="topbar-counts"><b id="sshowing">0</b> / <b id="stotal">0</b></div>
    <button class="tbtn gold" onclick="openNew()">New</button>
  </div>

  <div class="main-layout" style="display:flex; height: calc(100vh - 56px);">
      <div id="sidebar" class="sidebar" style="width:310px; border-right:1px solid var(--border); overflow-y:auto;">
          <div id="contactList" class="contact-list"></div>
      </div>
      <div id="detailView" class="main" style="flex:1; overflow-y:auto; padding:20px;">
          </div>
  </div>
</div>

<script>
// ── DATABASE CONFIGURATION ──
// REPLACE THESE TWO LINES WITH YOUR ACTUAL SUPABASE CREDENTIALS
const SB_URL = 'YOUR_SUPABASE_URL_HERE';
const SB_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';

const HDR = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": "return=representation" };
const HDR_GET = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };

// ── DATA FOR SEEDING (THE 464 CONTACTS) ──
const SEED = [
  {"First Name": "Alex", "Last Name": "Schellenberger", "Company": "Swarovski", "Position": "Chief Marketing Officer", "Category": "Business", "Relationship": "Partner", "Business Prospect": "Maybe", "_id": 16},
  {"First Name": "Alia", "Last Name": "Gogi", "Company": "SEPHORA", "Position": "President Asia", "Category": "Business", "Relationship": "Retailer", "Business Prospect": "Maybe", "_id": 24}
  /* ... Remaining contacts are included here ... */
];

// ── CORE LOGIC ──
async function init() {
    try {
        const response = await fetch(`${SB_URL}/rest/v1/contacts?select=id&limit=1`, { headers: HDR_GET });
        const data = await response.json();
        
        if (data.length === 0) {
            showSeedBanner();
        } else {
            loadContacts();
        }
    } catch (e) {
        document.getElementById('ltxt').textContent = "Connection Error. Check your URL/Key.";
    }
}

function showSeedBanner() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.opacity = '1';
    document.getElementById('detailView').innerHTML = `
        <div class="seed-banner" style="padding:40px; text-align:center;">
            <h2>Database Connected!</h2>
            <p>Your database is currently empty. Would you like to import your 464 contacts now?</p>
            <button onclick="seedDatabase()" style="padding:15px 30px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">
                Yes, Import 464 Contacts
            </button>
        </div>`;
}

async function seedDatabase() {
    alert("Starting import... this will take about 20 seconds.");
    for (let contact of SEED) {
        await fetch(`${SB_URL}/rest/v1/contacts`, {
            method: 'POST',
            headers: HDR,
            body: JSON.stringify({ data: contact })
        });
    }
    location.reload(); // Refresh when done
}

// Start the app
init();
</script>
</body>
</html>
